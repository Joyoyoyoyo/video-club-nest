version: '3.8'

services:
  # --- Base de données ---
  postgres:
    image: postgres:15
    container_name: videoclub_db
    restart: always
    environment:
      POSTGRES_USER: user_nest
      POSTGRES_PASSWORD: password_nest
      POSTGRES_DB: videoclub_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Interface de gestion DB ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: videoclub_admin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - postgres

  # --- Ton application NestJS ---
  api:
    build: .
    container_name: videoclub_api
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app            # Synchronise ton code en temps réel
      - /usr/src/app/node_modules # Garde les modules installés dans le container
    environment:
      # Note : l'hôte est "postgres" (le nom du service ci-dessus)
      DATABASE_URL: "postgresql://user_nest:password_nest@postgres:5432/videoclub_db?schema=public"
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - postgres
    command: npm run start:dev    # Force le mode dev avec watch

volumes:
  postgres_data: